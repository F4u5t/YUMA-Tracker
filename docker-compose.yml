services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - dokploy-network
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yuma-frontend.rule=Host(`faust-lawn-maintenance-faustlawn-dknv27-9d9f82-69-27-69-20.traefik.me`)"
      - "traefik.http.routers.yuma-frontend.entrypoints=web"
      - "traefik.http.services.yuma-frontend.loadbalancer.server.port=80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "18080"
    env_file:
      - .env
    networks:
      - internal

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
